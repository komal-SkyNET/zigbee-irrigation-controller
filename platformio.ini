; [env:xiao-esp32c6-zigbee]
; platform = https://github.com/pioarduino/platform-espressif32.git
; board = esp32-c6-devkitm-1
; framework = arduino

; ; --- Zigbee essentials ---
; build_flags =
;   -D ZIGBEE_MODE_ZCZR       ; Router/Coordinator mode per Arduino Zigbee docs
; board_build.partitions = partitions.csv  ; Zigbee ZCZR partition table (see note)

; ; --- Usability ---
; monitor_speed = 115200
; upload_speed  = 921600
; build_type    = release
; monitor_filters = esp32_exception_decoder, time

; Seeed XIAO ESP32-C6 + Zigbee (Arduino 3.x via pioarduino)
[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32c6
framework = arduino

; Zigbee router + partitions
build_flags =
  -D ZIGBEE_MODE_ZCZR
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D CONFIG_ARDUHAL_LOG_COLORS
board_build.partitions = partitions.csv

; I/O / debug
monitor_speed = 115200
upload_speed  = 460800
monitor_filters = esp32_exception_decoder, time
build_type = debug
